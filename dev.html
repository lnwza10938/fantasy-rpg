<!doctype html>
<html lang="en" data-app-page="dev">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realm Chronicle · Dev Panel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/client/style.css" />
  </head>
  <body class="dev-route-page">
    <div class="dev-route-shell">
      <header class="dev-route-header">
        <div>
          <div class="dev-route-kicker">Developer Route</div>
          <h1>Dev Panel</h1>
          <p>Command center for navigation, world tooling, content tooling, and system actions.</p>
        </div>
      </header>

      <main class="dev-command-grid">
        <section class="dev-command-card">
          <div class="dev-command-heading">World Tools</div>
          <div class="dev-command-actions">
            <button type="button" class="btn btn-primary" onclick="window.location.href='/dev-map-editor'">Open Map Editor</button>
            <button type="button" class="btn btn-action">Open World Builder</button>
            <button type="button" class="btn btn-action">Validate Realm</button>
          </div>
        </section>

        <section class="dev-command-card">
          <div class="dev-command-heading">Content Tools</div>
          <div class="dev-command-actions">
            <button type="button" class="btn btn-primary" onclick="window.location.href='/dev-assets'">Open Asset Library</button>
            <button type="button" class="btn btn-action">Open Story Library</button>
            <button type="button" class="btn btn-action">Open Dialogue Tools</button>
          </div>
        </section>

        <section class="dev-command-card">
          <div class="dev-command-heading">System Tools</div>
          <div class="dev-command-actions">
            <button type="button" class="btn btn-primary">Sync Data</button>
            <button type="button" class="btn btn-action">Run Checks</button>
            <button type="button" class="btn btn-action">Export Snapshot</button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
