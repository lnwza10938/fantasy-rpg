<!doctype html>
<html lang="en" data-app-page="dev">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realm Chronicle · Dev Panel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/client/style.css" />
  <script type="module" src="/src/client/i18n.ts"></script>
      
  <style id="i18n-style">
      .i18n-switcher-fixed {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10000;
        display: flex;
        gap: 6px;
        background: rgba(14, 16, 21, 0.9);
        padding: 5px;
        border-radius: 99px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(212, 188, 132, 0.25);
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
      .i18n-btn {
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        padding: 6px 14px;
        border-radius: 99px;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
      }
      .i18n-btn.active {
        background: rgba(212, 188, 132, 0.25);
        color: #f4ead2;
        box-shadow: inset 0 0 8px rgba(212, 188, 132, 0.1);
      }
      .i18n-btn:hover:not(.active) {
        color: #fff;
        background: rgba(255,255,255,0.05);
      }
    </style>
  </head>
  <body class="dev-route-page">
    <div class="dev-route-shell">
      <header class="dev-route-header">
        <div>
          <div class="dev-route-kicker">Developer Route</div>
          <h1>Dev Panel</h1>
          <p>Command center for navigation, world tooling, content tooling, and system actions.</p>
        </div>
      </header>

      <main class="dev-command-grid">
        <section class="dev-command-card">
          <div class="dev-command-heading"><span data-i18n="dev.world_tools">World Tools</span></div>
          <div class="dev-command-actions">
            <button type="button" class="btn btn-primary" onclick="window.location.href='/dev-map-editor'"><span data-i18n="dev.open_editor">Open Map Editor</span></button>
            <button type="button" class="btn btn-action"><span data-i18n="dev.open_builder">Open World Builder</span> data-i18n="wizard.builder_kicker"</button>
            <button type="button" class="btn btn-action"><span data-i18n="dev.validate_realm">Validate Realm</span></button>
          </div>
        </section>

        <section class="dev-command-card">
          <div class="dev-command-heading"><span data-i18n="dev.content_tools">Content Tools</span></div>
          <div class="dev-command-actions">
            <button type="button" class="btn btn-primary" onclick="window.location.href='/dev-assets'"><span data-i18n="dev.open_assets">Open Asset Library</span></button>
            <button type="button" class="btn btn-action"><span data-i18n="dev.open_story">Open Story Library</span></button>
            <button type="button" class="btn btn-action"><span data-i18n="dev.open_dialogue">Open Dialogue Tools</span></button>
          </div>
        </section>

        <section class="dev-command-card">
          <div class="dev-command-heading"><span data-i18n="dev.system_tools">System Tools</span></div>
          <div class="dev-command-actions">
            <button type="button" class="btn btn-primary"><span data-i18n="dev.sync_data">Sync Data</span></button>
            <button type="button" class="btn btn-action"><span data-i18n="dev.run_checks">Run Checks</span></button>
            <button type="button" class="btn btn-action"><span data-i18n="dev.export_snapshot">Export Snapshot</span></button>
          </div>
        </section>
      </main>
    </div>
      <script type="module" id="i18n-js">
      import { i18n } from "/src/client/i18n.ts";
      const refreshSwitcher = () => {
        document.querySelectorAll("[data-lang-set]").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.langSet === i18n.getLanguage());
        });
      };
      document.querySelectorAll("[data-lang-set]").forEach(btn => {
        btn.addEventListener("click", () => {
          i18n.setLanguage(btn.dataset.langSet);
          refreshSwitcher();
        });
      });
      refreshSwitcher();
    </script>
  </body>
</html>
