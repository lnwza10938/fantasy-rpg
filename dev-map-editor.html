<!doctype html>
<html lang="en" data-app-page="dev-map-editor">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realm Chronicle · Map Editor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/client/style.css" />
  </head>
  <body class="map-editor-page">
    <div class="map-editor-shell">
      <header class="map-editor-topbar">
        <div class="map-editor-topbar-main">
          <div style="display: flex; align-items: center; gap: 12px;">
            <a href="/dev-panel" class="map-editor-tool" style="padding: 6px 12px; font-size: 11px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">← Dev Panel</a>
            <div class="map-editor-brand" id="map-editor-world-name">No world selected</div>
          </div>
          <div class="map-editor-topbar-subtitle" id="map-editor-world-meta">Choose a canonical world to begin.</div>
        </div>
        <div class="map-editor-topbar-actions">
          <select id="map-editor-world-select" class="map-editor-field" style="width: auto;"></select>
          <select id="map-editor-override-select" class="map-editor-field" style="width: auto;"></select>
          <button id="map-editor-preview-btn" class="map-editor-tool" type="button">Preview</button>
          <button id="map-editor-undo-btn" class="map-editor-tool" type="button">Undo</button>
          <button id="map-editor-redo-btn" class="map-editor-tool" type="button">Redo</button>
          <button id="map-editor-validate-btn" class="map-editor-tool" type="button">Validate</button>
          <button id="map-editor-save-draft-btn" class="map-editor-tool" type="button">Draft</button>
          <button id="map-editor-reset-btn" class="map-editor-tool" type="button">Reset</button>
          <button id="map-editor-save-btn" class="map-editor-tool active" type="button">Save</button>
        </div>
      </header>

      <!-- Minimal Translate & UI Mode Toggles -->
      <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 0 4px;">
        <div class="dev-inline-form" style="padding: 8px 16px; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(212, 188, 132, 0.1); display: flex; align-items: center; gap: 12px;">
          <input id="map-editor-dev-key" type="password" placeholder="Dev Key" class="map-editor-field" style="max-width: 140px; padding: 6px 10px;" />
          <button id="map-editor-save-key" class="map-editor-tool" type="button" style="padding: 6px 12px;">Set Key</button>
          <div id="map-editor-status" style="font-size: 11px; color: var(--muted);"></div>
        </div>
        <div style="display: flex; gap: 8px;">
           <div id="google_translate_element" style="display: none"></div>
           <button id="translate-btn" class="map-editor-tool" type="button" style="padding: 6px 12px;">🌐 Translate</button>
           <div id="translate-panel" style="display: none;">
             <div class="lang-list">
               <button class="lang-btn" data-lang="" type="button">🇺🇸</button>
               <button class="lang-btn" data-lang="th" type="button">🇹🇭</button>
               <button class="lang-btn" data-lang="ja" type="button">🇯🇵</button>
             </div>
             <input type="checkbox" id="auto-translate-toggle" />
             <input type="checkbox" id="ui-mode-toggle" />
           </div>
        </div>
      </div>

      <main class="map-editor-layout">
        <aside class="map-editor-panel map-editor-toolbox">
          <div class="map-editor-panel-title">World & Tools</div>
          
          <section class="map-editor-group">
            <input id="map-editor-search" type="text" placeholder="Search worlds..." class="map-editor-field" />
            <div id="map-editor-world-list" class="dev-map-world-list" style="margin-top: 10px; display: grid; gap: 6px;"></div>
          </section>

          <section class="map-editor-group">
            <div class="map-editor-group-title">Tool Mode</div>
            <div class="map-editor-tool-list">
              <button id="map-tool-select" type="button" class="map-editor-tool active">🖱 Select</button>
              <button id="map-tool-move" type="button" class="map-editor-tool">✥ Move Node</button>
              <button id="map-tool-add-node" type="button" class="map-editor-tool">⊕ Add Node</button>
              <button id="map-tool-add-path" type="button" class="map-editor-tool">⇄ Add Path</button>
              <button id="map-tool-delete" type="button" class="map-editor-tool">⌫ Delete</button>
              <button id="map-tool-pan" type="button" class="map-editor-tool">✋ Pan</button>
            </div>
          </section>

          <section class="map-editor-group">
            <div class="map-editor-group-title">Layers</div>
            <div class="map-editor-toggle-list" style="display: grid; gap: 6px;">
              <label class="map-editor-toggle-row"><input id="map-layer-paths" type="checkbox" checked /> Paths</label>
              <label class="map-editor-toggle-row"><input id="map-layer-nodes" type="checkbox" checked /> Nodes</label>
              <label class="map-editor-toggle-row"><input id="map-layer-labels" type="checkbox" checked /> Labels</label>
              <label class="map-editor-toggle-row"><input id="map-layer-regions" type="checkbox" checked /> Regions</label>
              <label class="map-editor-toggle-row"><input id="map-layer-locked" type="checkbox" checked /> Fog/Hidden</label>
              <label class="map-editor-toggle-row"><input id="map-layer-terrain" type="checkbox" checked /> Terrain</label>
            </div>
          </section>

          <section class="map-editor-group">
            <div class="map-editor-group-title">Quick Actions</div>
            <div class="map-editor-tool-list">
              <button id="map-editor-auto-layout" type="button" class="map-editor-tool">⟲ Auto Layout</button>
              <button id="map-editor-center" type="button" class="map-editor-tool">◎ Center Map</button>
              <button id="map-editor-duplicate" type="button" class="map-editor-tool">⎘ Duplicate Node</button>
              <button id="map-editor-branch" type="button" class="map-editor-tool">⑂ Create Branch</button>
            </div>
          </section>
        </aside>

        <section class="map-editor-panel map-editor-canvas-panel">
          <div class="map-editor-panel-head" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
            <div>
              <div class="map-editor-panel-title" style="border: none; margin: 0; padding: 0;">Map Canvas</div>
              <div id="map-editor-selection-copy" style="font-size: 11px; color: var(--muted); margin-top: 4px;">Select a node or path to edit.</div>
            </div>
            <div class="map-editor-canvas-chip" id="map-editor-validation-summary">Not checked</div>
          </div>

          <div class="map-editor-canvas-shell">
             <div id="map-editor-canvas" class="dev-topology-board" style="position: absolute; inset: 0;"></div>
          </div>

          <div id="map-editor-validation" style="max-height: 100px; overflow-y: auto; margin-top: 10px; font-size: 12px; display: grid; gap: 4px;"></div>
        </section>

        <aside class="map-editor-panel map-editor-inspector">
          <div class="map-editor-panel-title">Inspector</div>

          <section class="map-editor-group">
            <div class="map-editor-group-title">Selection: <span id="map-editor-selection-title" style="color: #f4ead2;">World Layout</span></div>
          </section>

          <section class="map-editor-group">
            <div class="map-editor-group-title">Global Layout</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
               <label style="display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--muted);">Width <input id="map-editor-width" type="number" class="map-editor-field" /></label>
               <label style="display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--muted);">Height <input id="map-editor-height" type="number" class="map-editor-field" /></label>
               <label style="display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--muted); grid-column: span 2;">Start <select id="map-editor-start-region" class="map-editor-field"></select></label>
               <label style="display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--muted); grid-column: span 2;">Goal <select id="map-editor-goal-region" class="map-editor-field"></select></label>
            </div>
          </section>

          <section id="map-editor-node-card" class="map-editor-group">
            <div style="display: flex; gap: 4px; margin-bottom: 12px;">
              <button id="map-editor-tab-node" class="map-editor-tool active" data-tab="node" style="flex: 1; text-align: center; padding: 6px 0;">Node</button>
              <button id="map-editor-tab-story" class="map-editor-tool" data-tab="story" style="flex: 1; text-align: center; padding: 6px 0;">Story</button>
              <button id="map-editor-tab-encounters" class="map-editor-tool" data-tab="encounters" style="flex: 1; text-align: center; padding: 6px 0;">Fights</button>
            </div>

            <div id="map-editor-node-tab-panel" class="dev-map-tab-panel is-active" data-tab-panel="node">
              <div style="display: grid; gap: 10px;">
                <select id="map-editor-node-region" class="map-editor-field"></select>
                <input id="map-editor-node-name" type="text" class="map-editor-field" placeholder="Location Name" />
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                  <input id="map-editor-node-biome" type="text" class="map-editor-field" placeholder="Biome" />
                  <input id="map-editor-node-danger" type="number" class="map-editor-field" placeholder="Danger" />
                  <input id="map-editor-node-x" type="number" class="map-editor-field" placeholder="X" />
                  <input id="map-editor-node-y" type="number" class="map-editor-field" placeholder="Y" />
                  <input id="map-editor-node-tier" type="number" class="map-editor-field" placeholder="Tier" />
                  <input id="map-editor-node-icon" type="text" class="map-editor-field" placeholder="Icon" />
                </div>
                <input id="map-editor-node-landmark" type="text" class="map-editor-field" placeholder="Landmark ID" />
                <input id="map-editor-node-accent" type="text" class="map-editor-field" placeholder="Accent Color (#hex)" />
                <div style="display: flex; gap: 8px;">
                  <label class="map-editor-toggle-row" style="flex: 1;"><input id="map-editor-node-start" type="checkbox" /> Start</label>
                  <label class="map-editor-toggle-row" style="flex: 1;"><input id="map-editor-node-goal" type="checkbox" /> Goal</label>
                </div>
                <input id="map-editor-node-enemies" type="text" class="map-editor-field" placeholder="Enemy Pool (csv)" />
              </div>
            </div>

            <div id="map-editor-story-tab-panel" class="dev-map-tab-panel" data-tab-panel="story">
              <div style="display: grid; gap: 10px;">
                <input id="map-editor-story-intro" type="text" class="map-editor-field" placeholder="Intro Text ID" />
                <input id="map-editor-story-dialogue-pack" type="text" class="map-editor-field" placeholder="Dialogue Pack" />
                <input id="map-editor-story-quest-hooks" type="text" class="map-editor-field" placeholder="Quest Hooks" />
                <textarea id="map-editor-story-beat" class="map-editor-field" style="min-height: 80px;" placeholder="Story Beat"></textarea>
              </div>
            </div>

            <div id="map-editor-encounters-tab-panel" class="dev-map-tab-panel" data-tab-panel="encounters">
              <div style="display: grid; gap: 10px;">
                <input id="map-editor-encounter-event-pack" type="text" class="map-editor-field" placeholder="Event Pack" />
                <input id="map-editor-encounter-table" type="text" class="map-editor-field" placeholder="Encounter Table" />
                <input id="map-editor-encounter-boss" type="text" class="map-editor-field" placeholder="Boss ID" />
                <input id="map-editor-encounter-ambience" type="text" class="map-editor-field" placeholder="Ambience" />
              </div>
            </div>
          </section>

          <section id="map-editor-path-card" class="map-editor-group">
            <div class="map-editor-group-title">Path Inspector</div>
            <div style="display: grid; gap: 10px;">
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <select id="map-editor-path-from" class="map-editor-field"></select>
                <select id="map-editor-path-to" class="map-editor-field"></select>
              </div>
              <select id="map-editor-path-kind" class="map-editor-field">
                <option value="road">road</option>
                <option value="hazard">hazard</option>
                <option value="secret">secret</option>
              </select>
              <input id="map-editor-path-difficulty" type="number" class="map-editor-field" placeholder="Difficulty" />
              <select id="map-editor-path-visibility" class="map-editor-field">
                <option value="visible">visible</option>
                <option value="fogged">fogged</option>
                <option value="hidden">hidden</option>
              </select>
              <input id="map-editor-path-requirements" type="text" class="map-editor-field" placeholder="Requirements" />
              <div style="display: flex; gap: 8px;">
                <label class="map-editor-toggle-row" style="flex: 1;"><input id="map-editor-path-gated" type="checkbox" /> Gated</label>
                <label class="map-editor-toggle-row" style="flex: 1;"><input id="map-editor-path-one-way" type="checkbox" /> 1-Way</label>
              </div>
              <input id="map-editor-path-effects" type="text" class="map-editor-field" placeholder="Travel Effects" />
            </div>
          </section>

          <div id="map-editor-geo-card" style="display: none;">
            <input id="map-editor-geo-sea" type="hidden" /><input id="map-editor-geo-fog" type="hidden" /><input id="map-editor-geo-glow" type="hidden" />
            <input id="map-editor-zone-terrain" type="hidden" /><input id="map-editor-zone-width" type="hidden" /><input id="map-editor-zone-height" type="hidden" />
            <input id="map-editor-zone-color" type="hidden" /><input id="map-editor-zone-opacity" type="hidden" /><input id="map-editor-zone-recipe" type="hidden" />
            <select id="map-editor-flow-kind" style="display: none;"><option value="river">river</option></select>
            <input id="map-editor-flow-width" type="hidden" /><input id="map-editor-flow-color" type="hidden" /><input id="map-editor-flow-opacity" type="hidden" /><input id="map-editor-flow-recipe" type="hidden" />
          </div>

          <section class="map-editor-group">
            <div class="map-editor-group-title">Override Draft (<span id="map-editor-draft-state">Clean</span>)</div>
            <div id="map-editor-draft-meta" style="font-size: 11px; margin-bottom: 8px; color: var(--muted);">No world selected.</div>
            <div id="map-editor-draft-summary" style="max-height: 100px; overflow-y: auto; display: grid; gap: 4px; margin-bottom: 10px;"></div>
            <textarea id="map-editor-draft-json" class="map-editor-field" style="font-family: monospace; font-size: 10px; height: 120px;" readonly></textarea>
          </section>
        </aside>
      </main>
    </div>

    <div id="map-editor-context-menu" class="dev-map-context-menu" hidden></div>

    <script type="module" src="/src/client/translateWidget.ts"></script>
    <script type="module" src="/src/client/devMapEditor.ts"></script>
  </body>
</html>
