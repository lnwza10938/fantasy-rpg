<!doctype html>
<html lang="en" data-app-page="vault">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realm Chronicle · Hero Archive</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Spectral:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/src/client/i18n.ts"></script>
    <link rel="stylesheet" href="/src/client/style.css" />
    <script>
      document.documentElement.classList.add("app-booting");
    </script>
  
    <style>
      .i18n-switcher-fixed {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10000;
        display: flex;
        gap: 6px;
        background: rgba(14, 16, 21, 0.9);
        padding: 5px;
        border-radius: 99px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(212, 188, 132, 0.25);
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
      .i18n-btn {
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        padding: 6px 14px;
        border-radius: 99px;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
      }
      .i18n-btn.active {
        background: rgba(212, 188, 132, 0.25);
        color: #f4ead2;
        box-shadow: inset 0 0 8px rgba(212, 188, 132, 0.1);
      }
      .i18n-btn:hover:not(.active) {
        color: #fff;
        background: rgba(255,255,255,0.05);
      }
    </style>

    <style id="i18n-style">
      .i18n-switcher-fixed {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10000;
        display: flex;
        gap: 6px;
        background: rgba(14, 16, 21, 0.9);
        padding: 5px;
        border-radius: 99px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(212, 188, 132, 0.25);
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
      .i18n-btn {
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        padding: 6px 14px;
        border-radius: 99px;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
      }
      .i18n-btn.active {
        background: rgba(212, 188, 132, 0.25);
        color: #f4ead2;
        box-shadow: inset 0 0 8px rgba(212, 188, 132, 0.1);
      }
      .i18n-btn:hover:not(.active) {
        color: #fff;
        background: rgba(255,255,255,0.05);
      }
    </style>
</head>
  <body>
    <div class="i18n-switcher-fixed">
      <button class="i18n-btn" data-lang-set="en">EN</button>
      <button class="i18n-btn" data-lang-set="th">TH</button>
    </div>

    
    
    
      <div class="auto-toggle">
        <span style="color: var(--muted)">Auto-translate on load</span>
        <label class="toggle-switch">
          <input type="checkbox" id="auto-translate-toggle" />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="auto-toggle" style="border-top: none; margin-top: 0">
        <span style="color: var(--accent)">Mobile Layout (Force)</span>
        <label class="toggle-switch">
          <input type="checkbox" id="ui-mode-toggle" />
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
    <script type="module" src="/src/client/translateWidget.ts"></script>

    <div id="game-container" style="display: none">
      <div class="header">
        <div class="top-nav-shell">
          <button class="btn btn-nav" data-nav-page="hub" onclick="showHubPage()"><span data-i18n="nav.home">🏠 Home</span></button>
          <button class="btn btn-nav" data-nav-page="adventure" onclick="showAdventurePage()">
            <span data-i18n="nav.journey">🧭 Journey</span>
          </button>
          <button class="btn btn-nav" data-nav-page="map" onclick="showMapPage()"><span data-i18n="nav.map">🗺 World Map</span></button>
          <button class="btn btn-nav" data-nav-page="forge" onclick="showForge('menu')">
            <span data-i18n="nav.create_hero">⚒ Create Hero</span>
          </button>
          <button class="btn btn-nav" data-nav-page="vault" onclick="showVault()"><span data-i18n="nav.archive">🧙 Hero Archive</span></button>
          <button class="btn btn-nav" onclick="logout()"><span data-i18n="common.logout">⇦ Logout</span></button>
        </div>
        <h1>⚔ Realm Chronicle</h1>
        <p id="user-display">Mythic Atlas hero archive</p>
        <div id="header-hero-status" class="header-hero-status">No active hero</div>
      </div>

      <div class="container">
        <div id="screen-vault" class="screen fade-in" style="display: block">
          <div class="card">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 12px;
                margin-bottom: 20px;
              "
            >
              <div>
                <div class="landing-kicker" style="margin-bottom: 6px">Hero Archive</div>
                <h2 style="margin: 0">Legends ready to resume</h2>
              </div>
              <button class="btn btn-primary" onclick="showForge('vault')">+ Create Hero</button>
            </div>
            <div id="vault-full-list" class="vault-grid"></div>
            <button class="btn btn-action" onclick="showHubPage()" style="margin-top: 20px; width: 100%">
              Back to Home
            </button>
          </div>
        </div>
      </div>

      <div id="toast" class="toast"></div>
    </div>

    <script type="module" src="/src/client/main.ts"></script>
  
    <script type="module">
      import { i18n } from "/src/client/i18n.ts";
      const refreshSwitcher = () => {
        document.querySelectorAll("[data-lang-set]").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.langSet === i18n.getLanguage());
        });
      };
      document.querySelectorAll("[data-lang-set]").forEach(btn => {
        btn.addEventListener("click", () => {
          i18n.setLanguage(btn.dataset.langSet);
          refreshSwitcher();
        });
      });
      refreshSwitcher();
    </script>

    <script type="module" id="i18n-js">
      import { i18n } from "/src/client/i18n.ts";
      const refreshSwitcher = () => {
        document.querySelectorAll("[data-lang-set]").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.langSet === i18n.getLanguage());
        });
      };
      document.querySelectorAll("[data-lang-set]").forEach(btn => {
        btn.addEventListener("click", () => {
          i18n.setLanguage(btn.dataset.langSet);
          refreshSwitcher();
        });
      });
      refreshSwitcher();
    </script>
</body>
</html>
