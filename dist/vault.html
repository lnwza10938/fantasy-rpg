<!doctype html>
<html lang="en" data-app-page="vault">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realm Chronicle · Hero Archive</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Spectral:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      document.documentElement.classList.add("app-booting");
    </script>
    <script type="module" crossorigin src="/assets/translateWidget-DznPB9g3.js"></script>
    <script type="module" crossorigin src="/assets/main-B49pcNuw.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/translateWidget-BCL21tyI.css">
  </head>
  <body>
    <div id="google_translate_element" style="display: none"></div>
    <button id="translate-btn" type="button">🌐 Translate ▾</button>
    <div id="translate-panel">
      <h4>🌍 Choose Language</h4>
      <div class="lang-list">
        <button class="lang-btn active" data-lang="" type="button">🇺🇸 English</button>
        <button class="lang-btn" data-lang="th" type="button">🇹🇭 ไทย</button>
        <button class="lang-btn" data-lang="ja" type="button">🇯🇵 日本語</button>
        <button class="lang-btn" data-lang="zh-CN" type="button">🇨🇳 中文</button>
        <button class="lang-btn" data-lang="ko" type="button">🇰🇷 한국어</button>
        <button class="lang-btn" data-lang="fr" type="button">🇫🇷 Français</button>
        <button class="lang-btn" data-lang="es" type="button">🇪🇸 Español</button>
        <button class="lang-btn" data-lang="de" type="button">🇩🇪 Deutsch</button>
        <button class="lang-btn" data-lang="ru" type="button">🇷🇺 Русский</button>
        <button class="lang-btn" data-lang="ar" type="button">🇸🇦 العربية</button>
      </div>
      <div class="auto-toggle">
        <span style="color: var(--muted)">Auto-translate on load</span>
        <label class="toggle-switch">
          <input type="checkbox" id="auto-translate-toggle" />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="auto-toggle" style="border-top: none; margin-top: 0">
        <span style="color: var(--accent)">Mobile Layout (Force)</span>
        <label class="toggle-switch">
          <input type="checkbox" id="ui-mode-toggle" />
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div id="game-container" style="display: none">
      <div class="header">
        <div class="top-nav-shell">
          <button class="btn btn-nav" data-nav-page="hub" onclick="showHubPage()">🏠 Home</button>
          <button class="btn btn-nav" data-nav-page="adventure" onclick="showAdventurePage()">
            🧭 Journey
          </button>
          <button class="btn btn-nav" data-nav-page="map" onclick="showMapPage()">🗺 World Map</button>
          <button class="btn btn-nav" data-nav-page="forge" onclick="showForge('menu')">
            ⚒ Create Hero
          </button>
          <button class="btn btn-nav" data-nav-page="vault" onclick="showVault()">🧙 Hero Archive</button>
          <button class="btn btn-nav" onclick="logout()">⇦ Logout</button>
        </div>
        <h1>⚔ Realm Chronicle</h1>
        <p id="user-display">Mythic Atlas hero archive</p>
        <div id="header-hero-status" class="header-hero-status">No active hero</div>
      </div>

      <div class="container">
        <div id="screen-vault" class="screen fade-in" style="display: block">
          <div class="card">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 12px;
                margin-bottom: 20px;
              "
            >
              <div>
                <div class="landing-kicker" style="margin-bottom: 6px">Hero Archive</div>
                <h2 style="margin: 0">Legends ready to resume</h2>
              </div>
              <button class="btn btn-primary" onclick="showForge('vault')">+ Create Hero</button>
            </div>
            <div id="vault-full-list" class="vault-grid"></div>
            <button class="btn btn-action" onclick="showHubPage()" style="margin-top: 20px; width: 100%">
              Back to Home
            </button>
          </div>
        </div>
      </div>

      <div id="toast" class="toast"></div>
    </div>

  </body>
</html>
