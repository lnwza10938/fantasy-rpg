<!doctype html>
<html lang="en" data-app-page="dev-assets-audio">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realm Chronicle · Audio Intake</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Spectral:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/client/style.css" />
  <script type="module" src="/src/client/i18n.ts"></script>
      <style id="i18n-style">
      .i18n-switcher-fixed {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10000;
        display: flex;
        gap: 6px;
        background: rgba(14, 16, 21, 0.9);
        padding: 5px;
        border-radius: 99px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(212, 188, 132, 0.25);
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
      .i18n-btn {
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        padding: 6px 14px;
        border-radius: 99px;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
      }
      .i18n-btn.active {
        background: rgba(212, 188, 132, 0.25);
        color: #f4ead2;
        box-shadow: inset 0 0 8px rgba(212, 188, 132, 0.1);
      }
      .i18n-btn:hover:not(.active) {
        color: #fff;
        background: rgba(255,255,255,0.05);
      }
    </style>
  </head>
  <body class="dev-panel-page dev-assets-page">
    <a href="/dev-assets" class="dev-launch-btn dev-launch-btn-inline">← Asset Library</a>
    
    <script type="module" src="/src/client/devAssetAudio.ts"></script>
      <script type="module" id="i18n-js">
      import { i18n } from "/src/client/i18n.ts";
      const refreshSwitcher = () => {
        document.querySelectorAll("[data-lang-set]").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.langSet === i18n.getLanguage());
        });
      };
      document.querySelectorAll("[data-lang-set]").forEach(btn => {
        btn.addEventListener("click", () => {
          i18n.setLanguage(btn.dataset.langSet);
          refreshSwitcher();
        });
      });
      refreshSwitcher();
    </script>
  </body>
</html>
